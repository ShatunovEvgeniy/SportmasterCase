worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/css application/javascript application/json text/plain;

    # Не отдаём наружу версию nginx в заголовках/страницах ошибок
    server_tokens off;

    # Тела запросов небольшие (отзыв максимум ~5000 символов текста), режем с запасом —
    # так внешний клиент не сможет заливать гигантские payload'ы на бэкенд
    client_max_body_size 1m;

    # POST /api/products/{id}/reviews запускает реальный вызов LLM (платный, YandexGPT) —
    # без лимита кто угодно снаружи может им спамить и накручивать счёт/забивать пайплайн.
    # Здесь — не полноценная защита (нужна ещё авторизация), а дешёвый барьер по IP.
    limit_req_zone $binary_remote_addr zone=reviews_zone:10m rate=6r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/m;

    upstream frontend {
        server frontend:8080;
    }

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;

        # Базовые защитные заголовки для демо за одним входом
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Запись нового отзыва — самый дорогой и самый спамо-опасный эндпоинт отдельно,
        # лимит жёстче, чем на остальной /api/ (лайки, статус задачи и т.п.)
        location ~ ^/api/products/[0-9]+/reviews$ {
            limit_req zone=reviews_zone burst=3 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FastAPI: остальной API (лайк/дизлайк, статус задачи, фидбек)
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/(docs|openapi.json|redoc) {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Всё остальное — сайт на Tomcat (каталог, карточка товара, презентация кейса)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
