services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: online_shop
      MYSQL_USER: ${ONLINE_SHOP_DB_USER}
      MYSQL_PASSWORD: ${ONLINE_SHOP_DB_PASSWORD}
      SPORTMASTER_DB_USER: ${SPORTMASTER_DB_USER}
      SPORTMASTER_DB_PASSWORD: ${SPORTMASTER_DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init/01-init-sportmaster-db.sh:/docker-entrypoint-initdb.d/01-init-sportmaster-db.sh:ro
      - ./backend/src/scripts/create_database.sql:/docker-entrypoint-initdb.d/02-sportmaster-schema.sql:ro
      - ./Sportmaster_frontend/src/main/resources/db/create_online_shop.sql:/docker-entrypoint-initdb.d/03-online_shop-schema.sql:ro
    # Порт 3306 наружу НЕ публикуется — доступ к MySQL только из docker-сети,
    # backend и frontend ходят к нему по имени сервиса "mysql".
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: ${SPORTMASTER_DB_USER}
      MYSQL_PASSWORD: ${SPORTMASTER_DB_PASSWORD}
      MYSQL_DATABASE: sportmaster
    depends_on:
      mysql:
        condition: service_healthy
    # Порт наружу не публикуется — доступ только через nginx (/api/...) внутри сети.

  frontend:
    build: ./Sportmaster_frontend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      ONLINE_SHOP_DB_USER: ${ONLINE_SHOP_DB_USER}
      ONLINE_SHOP_DB_PASSWORD: ${ONLINE_SHOP_DB_PASSWORD}
      SPORTMASTER_DB_USER: ${SPORTMASTER_DB_USER}
      SPORTMASTER_DB_PASSWORD: ${SPORTMASTER_DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    # Порт наружу не публикуется — доступ только через nginx.

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  mysql-data:
